<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Notes - Learn Sargam</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Home Page -->
        <div id="homePage" class="page active">
            <div class="home-container">
                <div class="header">
                    <h1>🎵 Learn Sargam 🎵</h1>
                    <p class="subtitle">Master the 8 Notes of Indian Classical Music</p>
                </div>

                <div class="lessons-grid" id="lessonsContainer">
                    <!-- Lessons will be loaded dynamically -->
                </div>

                <div class="notes-info">
                    <h3>The 8 Notes of Sargam:</h3>
                    <div class="notes-display">
                        <div class="note-label">
                            <span class="note-letter S">S</span>
                            <span class="note-name">Sa</span>
                        </div>
                        <div class="note-label">
                            <span class="note-letter R">R</span>
                            <span class="note-name">Re</span>
                        </div>
                        <div class="note-label">
                            <span class="note-letter G">G</span>
                            <span class="note-name">Ga</span>
                        </div>
                        <div class="note-label">
                            <span class="note-letter M">M</span>
                            <span class="note-name">Ma</span>
                        </div>
                        <div class="note-label">
                            <span class="note-letter P">P</span>
                            <span class="note-name">Pa</span>
                        </div>
                        <div class="note-label">
                            <span class="note-letter D">D</span>
                            <span class="note-name">Da</span>
                        </div>
                        <div class="note-label">
                            <span class="note-letter N">N</span>
                            <span class="note-name">Ni</span>
                        </div>
                        <div class="note-label">
                            <span class="note-letter Sa">Ṡ</span>
                            <span class="note-name">Saa</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lesson Page -->
        <div id="lessonPage" class="page">
            <div class="lesson-header">
                <button class="back-btn" onclick="goHome()">← Back</button>
                <h2 id="lessonTitle"></h2>
                <div></div> <!-- spacer -->
            </div>

            <div class="lesson-container">
                <!-- Left: Text Content -->
                <div class="lesson-text-panel">
                    <h3>Notes Pattern</h3>
                    <div id="notesContent" class="notes-content">
                        <!-- Content will be loaded here -->
                    </div>
                </div>

                <!-- Right: Animation Panel -->
                <div class="lesson-animation-panel">
                    <div class="controls-panel">
                        <button id="playBtn" class="control-btn play-btn" onclick="togglePlay()">
                            <span class="btn-icon">▶</span> Play
                        </button>
                        <button id="stopBtn" class="control-btn stop-btn" onclick="stopPlay()">
                            <span class="btn-icon">⏹</span> Stop
                        </button>
                        <div class="toggle-controls">
                            <button id="soundToggle" class="toggle-btn active" onclick="toggleSound()">
                                <span class="btn-icon">🔊</span> Sound
                            </button>
                            <button id="voiceToggle" class="toggle-btn" onclick="toggleVoice()">
                                <span class="btn-icon">🎤</span> Voice
                            </button>
                        </div>
                    </div>

                    <div class="staff-container">
                        <div class="staff">
                            <div class="staff-line"></div>
                            <div class="staff-line"></div>
                            <div class="staff-line"></div>
                            <div class="staff-line"></div>
                            <div class="staff-line"></div>
                            <div class="staff-line"></div>
                            <div class="staff-line"></div>
                            <div class="staff-line"></div>
                        </div>
                        <div id="notesAnimation" class="notes-animation">
                            <!-- Animated notes will be placed here -->
                        </div>
                    </div>

                    <div class="progress-info">
                        <span id="progressText">Ready to learn</span>
                        <div class="progress-bar">
                            <div id="progressFill" class="progress-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div id="feedbackModal" class="feedback-modal">
        <div class="feedback-content">
            <div class="feedback-header">
                <h2>📝 Send Your Feedback</h2>
                <button class="feedback-close" onclick="closeFeedback()">×</button>
            </div>
            
            <div class="feedback-body">
                <!-- Name Section -->
                <div class="feedback-section">
                    <label for="feedbackName">Your Name:</label>
                    <input type="text" id="feedbackName" placeholder="Enter your name">
                </div>

                <!-- Rating Section -->
                <div class="feedback-section">
                    <label>How would you rate this app? ⭐</label>
                    <div class="rating-stars">
                        <button class="star" onclick="setRating(1)" data-rating="1">★</button>
                        <button class="star" onclick="setRating(2)" data-rating="2">★</button>
                        <button class="star" onclick="setRating(3)" data-rating="3">★</button>
                        <button class="star" onclick="setRating(4)" data-rating="4">★</button>
                        <button class="star" onclick="setRating(5)" data-rating="5">★</button>
                    </div>
                    <span id="ratingDisplay" class="rating-display">Select a rating</span>
                </div>
                
                <!-- Feedback Text -->
                <div class="feedback-section">
                    <label for="feedbackText">Your Feedback:</label>
                    <textarea id="feedbackText" placeholder="Tell us what you think... (optional)" rows="5"></textarea>
                </div>
                
                <!-- Email (Optional) -->
                <div class="feedback-section">
                    <label for="feedbackEmail">Your Email (optional):</label>
                    <input type="email" id="feedbackEmail" placeholder="yourname@example.com">
                </div>

                <!-- Previous Feedback Display -->
                <div class="feedback-section" id="feedbackListSection" style="display: none;">
                    <label>� What Others Say:</label>
                    <div id="feedbackList" class="feedback-list"></div>
                </div>
            </div>
            
            <div class="feedback-footer">
                <button class="feedback-btn cancel" onclick="closeFeedback()">Cancel</button>
                <button class="feedback-btn submit" onclick="submitFeedback()">Submit Feedback</button>
            </div>
        </div>
    </div>

    <!-- Floating Feedback Button -->
    <button id="feedbackBtn" class="floating-feedback-btn" onclick="openFeedback()">💬 Feedback</button>

    <script src="script.js"></script>
</body>
</html>
